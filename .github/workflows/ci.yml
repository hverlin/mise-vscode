name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MISE_LOCKED: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          install: true
          cache: true

      - run: aube ci --frozen-lockfile
      - run: node --run lint
      - run: node --run ts-check
      - run: node --run test
      - run: node --run build

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          install: true
          cache: true

      - run: sudo apt update
      - uses: awalsh128/cache-apt-pkgs-action@5513791f75b039e2a79653b1a92238d3fb8d99b4  # v1.6.2
        with:
          packages: 'libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 xvfb dbus-x11'
          version: 1.0

      - run: aube ci --frozen-lockfile
      - run: node --run build
      - run: xvfb-run -a node --run e2e-tests
